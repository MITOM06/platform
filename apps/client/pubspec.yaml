name: platform_client
description: Platform — Realtime Messaging App (Flutter client)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Internationalization (i18n)
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

  # WebSocket (STOMP)
  stomp_dart_client: ^3.0.1

  # Network connectivity
  connectivity_plus: ^6.0.0

  # Emoji picker (message composer + reactions)
  emoji_picker_flutter: ^3.1.0

  # Image picking & remote image caching (avatars + chat media)
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # General file picking (PDF / DOC / ZIP attachments)
  file_picker: ^8.1.2

  # Open / download media (image & video) cross-platform (web + mobile)
  url_launcher: ^6.3.0

  # Firebase Push Notifications
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1

  # WebRTC for 1-1 Calling
  flutter_webrtc: ^0.12.11

  # Rich text / markdown rendering in message bubbles (Task 54)
  flutter_markdown: ^0.7.7

  # Voice message recording (Task 89)
  record: ^7.0.0
  path_provider: ^2.1.4

  # Audio playback for voice messages (Task 89)
  audioplayers: ^6.1.0

  # Error tracking
  sentry_flutter: ^9.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
