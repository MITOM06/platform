server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/platform}
    redis:
      url: ${SPRING_DATA_REDIS_URL:}
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1
  environment: ${SPRING_PROFILES_ACTIVE:development}

app:
  cors:
    # Comma-separated allowed origins for REST + WebSocket. Default "*" for local dev.
    allowed-origins: ${ALLOWED_ORIGINS:*}
  jwt:
    secret: ${JWT_ACCESS_SECRET}
  firebase:
    # Base64 của file service-account JSON (Firebase Console). Rỗng = FCM tắt (no-op an toàn).
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
