server:
  port: 8080

spring:
  application:
    # Used by Micrometer/OTel as the service.name resource attribute (Jaeger service filter).
    name: ${SPRING_APPLICATION_NAME:chat-service}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:platform}
    password: ${SPRING_RABBITMQ_PASSWORD:platform}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    # Fail fast if the broker is unreachable — prevents RabbitAdmin.start() from
    # blocking indefinitely and holding up the Spring context (which would prevent
    # Tomcat from binding to port 8080 before Cloud Run's startup probe times out).
    connection-timeout: 5000
    ssl:
      # Production (CloudAMQP / managed RabbitMQ) requires TLS. Deploy workflow sets
      # SPRING_RABBITMQ_SSL_ENABLED=true. Local dev stays false (plain AMQP).
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/platform}
      # Spring Boot 3 disables auto-index-creation by default, so @Indexed/@CompoundIndex/
      # @TextIndexed definitions on @Document models were never built in prod (every
      # message/conversation query fell back to a full COLLSCAN). Re-enable it so the declared
      # indexes are created at startup. Builds run in the background on existing collections.
      auto-index-creation: true
    redis:
      # Falls back to a host/port-derived URL when SPRING_DATA_REDIS_URL is unset
      # (an empty url crashes Lettuce with "scheme 'null' is not supported").
      # Production sets SPRING_DATA_REDIS_URL (Upstash TLS) which overrides this.
      url: ${SPRING_DATA_REDIS_URL:redis://${SPRING_DATA_REDIS_HOST:localhost}:${SPRING_DATA_REDIS_PORT:6379}}
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        # Liveness = "is the JVM alive?" — never include external deps, otherwise a
        # transient RabbitMQ / Redis blip causes Cloud Run to restart the container.
        liveness:
          include: ping
        # Readiness = "can it serve traffic?" — includes external backing services.
        readiness:
          include: mongo,redis,rabbit
  info:
    env:
      enabled: true
  tracing:
    sampling:
      # Default 0.0 (off) so startup health-check spans are not exported to the
      # missing localhost:4318 endpoint on Cloud Run. Set OTEL_SAMPLING_PROBABILITY=1.0
      # when a real OTLP collector (Jaeger/Grafana) is available.
      probability: ${OTEL_SAMPLING_PROBABILITY:0.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1
  environment: ${SPRING_PROFILES_ACTIVE:development}

app:
  cors:
    # Comma-separated allowed origins for REST + WebSocket. Default "*" for local dev.
    allowed-origins: ${ALLOWED_ORIGINS:*}
  jwt:
    secret: ${JWT_ACCESS_SECRET}
  firebase:
    # Base64 của file service-account JSON (Firebase Console). Rỗng = FCM tắt (no-op an toàn).
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  reminder:
    # Interval (ms) for the due-reminder delivery sweep. Default 60s.
    sweep-interval-ms: ${REMINDER_SWEEP_INTERVAL_MS:60000}
