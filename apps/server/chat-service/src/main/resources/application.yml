server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27018/platform
    redis:
      host: localhost
      port: 6379
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB

app:
  jwt:
    secret: ${JWT_ACCESS_SECRET}
