server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27018/platform
    redis:
      url: ${REDIS_URL:}
      host: localhost
      port: 6379
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_ACCESS_SECRET}
  firebase:
    # Base64 của file service-account JSON (Firebase Console). Rỗng = FCM tắt (no-op an toàn).
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
