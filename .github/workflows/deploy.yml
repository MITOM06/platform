name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-69d1bd8e-5952-47ea-81e
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/project-69d1bd8e-5952-47ea-81e/platform-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Test auth-service
        run: |
          cd apps/server/auth-service
          pnpm install --frozen-lockfile
          pnpm exec jest --ci

      - name: Test ai-service
        run: |
          cd apps/server/ai-service
          pnpm install --frozen-lockfile
          pnpm exec jest --ci

      - name: Test connector-service
        run: |
          cd apps/server/connector-service
          pnpm install --frozen-lockfile
          pnpm exec jest --ci
        env:
          CONNECTOR_VAULT_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test chat-service
        run: |
          cd apps/server/chat-service
          mvn test -q
        env:
          JWT_ACCESS_SECRET: ci_test_secret_must_be_at_least_32_chars_long

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      # Build & push auth-service (context = repo root, Dockerfile inside service dir)
      - name: Build auth-service
        run: |
          docker build -t $REGISTRY/auth-service:${{ github.sha }} \
            -f apps/server/auth-service/Dockerfile .
          docker push $REGISTRY/auth-service:${{ github.sha }}

      # Build & push chat-service
      - name: Build chat-service
        run: |
          docker build -t $REGISTRY/chat-service:${{ github.sha }} apps/server/chat-service/
          docker push $REGISTRY/chat-service:${{ github.sha }}

      # Build & push ai-service (context = repo root, dockerfile inside)
      - name: Build ai-service
        run: |
          docker build \
            -t $REGISTRY/ai-service:${{ github.sha }} \
            -f apps/server/ai-service/Dockerfile \
            .
          docker push $REGISTRY/ai-service:${{ github.sha }}

      # Build & push connector-service (MCP connectors / OAuth / token vault)
      - name: Build connector-service
        run: |
          docker build \
            -t $REGISTRY/connector-service:${{ github.sha }} \
            -f apps/server/connector-service/Dockerfile \
            .
          docker push $REGISTRY/connector-service:${{ github.sha }}

      # Deploy auth-service (min 1 instance — eliminates login cold-start; --cpu-boost
      # speeds the remaining cold scale-ups; 1Gi memory gives argon2 (~64MB/hash) headroom)
      - name: Deploy auth-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: auth-service
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/auth-service:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=3
            --memory=1Gi
            --cpu=1
            --cpu-boost
            --port=3001
          env_vars: |
            NODE_ENV=production
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            JWT_ACCESS_EXPIRES=15m
            JWT_REFRESH_EXPIRES=30d
            MONGO_URI=${{ secrets.MONGODB_URI }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USER=${{ secrets.MAIL_USER }}
            MAIL_PASS=${{ secrets.MAIL_PASS }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            FACEBOOK_APP_ID=${{ secrets.FACEBOOK_APP_ID }}
            FACEBOOK_APP_SECRET=${{ secrets.FACEBOOK_APP_SECRET }}
            X_CLIENT_ID=${{ secrets.X_CLIENT_ID }}
            X_CLIENT_SECRET=${{ secrets.X_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://auth-service-942942821810.asia-southeast1.run.app/auth/google/callback
            X_CALLBACK_URL=https://auth-service-942942821810.asia-southeast1.run.app/auth/x/callback
            BASE_URL=https://auth-service-942942821810.asia-southeast1.run.app
            WEB_REDIRECT_URL=https://platform-web-omega-amber.vercel.app/oauth-callback
            MOBILE_DEEPLINK_URL=platform://auth

      # Deploy chat-service (min 1 instance — WebSocket needs persistent connection)
      - name: Deploy chat-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: chat-service
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/chat-service:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=3
            --memory=2Gi
            --cpu=1
            --cpu-boost
            --port=8080
            --session-affinity
          env_vars: |
            JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+UseContainerSupport
            SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            SPRING_DATA_MONGODB_URI=${{ secrets.MONGODB_URI || 'mongodb://localhost:27018/platform' }}
            SPRING_DATA_REDIS_URL=${{ secrets.REDIS_URL || 'redis://localhost:6379' }}
            SPRING_RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST || 'localhost' }}
            SPRING_RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT || '5672' }}
            SPRING_RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME || 'platform' }}
            SPRING_RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD || 'platform' }}
            SPRING_RABBITMQ_VIRTUAL_HOST=${{ secrets.RABBITMQ_VHOST || '/' }}
            SPRING_RABBITMQ_SSL_ENABLED=true
            ALLOWED_ORIGINS=https://platform-web-omega-amber.vercel.app
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USER=${{ secrets.MAIL_USER }}
            MAIL_PASS=${{ secrets.MAIL_PASS }}
            FIREBASE_SERVICE_ACCOUNT_BASE64=${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}

      # Deploy ai-service (min 1 + CPU always allocated — the RabbitMQ consumer is a
      # background connection; with default CPU throttling it loses CPU between HTTP
      # requests, drops the AMQP heartbeat (ECONNRESET) and stops consuming ai.requests,
      # making the assistant silent. --no-cpu-throttling keeps the consumer alive.)
      - name: Deploy ai-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ai-service
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/ai-service:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --no-cpu-throttling
            --port=3002
          env_vars: |
            NODE_ENV=production
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            ANTHROPIC_MODEL=claude-sonnet-4-5
            ANTHROPIC_FALLBACK_MODEL=claude-haiku-4-5-20251001
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            QDRANT_URL=${{ secrets.QDRANT_URL }}
            AI_BOT_USER_ID=ai-bot-000000000000000000000001
            AI_BOT_DISPLAY_NAME=${{ secrets.AI_BOT_DISPLAY_NAME }}
            REDIS_AI_RESPONSE_PREFIX=ai:response
            AI_MONTHLY_TOKEN_LIMIT=500000
            CONNECTOR_INTERNAL_URL=https://connector-service-lwnzrufcxa-as.a.run.app
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}

      # Deploy connector-service (MCP connectors / OAuth / token vault). min 1 +
      # CPU always allocated: it holds remote MCP connections and serves the
      # ai-service internal tools API; throttled CPU would stall those.
      - name: Deploy connector-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: connector-service
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/connector-service:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=1
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --no-cpu-throttling
            --port=3003
          env_vars: |
            NODE_ENV=production
            MONGO_URI=${{ secrets.MONGODB_URI }}
            CONNECTOR_VAULT_KEY=${{ secrets.CONNECTOR_VAULT_KEY }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            OAUTH_REDIRECT_BASE=https://connector-service-lwnzrufcxa-as.a.run.app
            CLIENT_REDIRECT_URL=https://platform-web-omega-amber.vercel.app/integrations
            NOTION_CLIENT_ID=${{ secrets.NOTION_CLIENT_ID }}
            NOTION_CLIENT_SECRET=${{ secrets.NOTION_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Print deployed URLs
        run: |
          echo "auth-service: $(gcloud run services describe auth-service --region=$REGION --format='value(status.url)')"
          echo "chat-service: $(gcloud run services describe chat-service --region=$REGION --format='value(status.url)')"
          echo "ai-service: $(gcloud run services describe ai-service --region=$REGION --format='value(status.url)')"
          echo "connector-service: $(gcloud run services describe connector-service --region=$REGION --format='value(status.url)')"
