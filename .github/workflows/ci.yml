name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Secret Scan ───────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── NestJS Auth Service ────────────────────────────────────────────────────
  auth-service:
    name: Auth Service (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - name: Install dependencies
        run: cd ../../../ && pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm exec jest --ci

  # ── Spring Boot Chat Service ───────────────────────────────────────────────
  chat-service:
    name: Chat Service (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server/chat-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Build & Test
        run: mvn clean test -q
        env:
          JWT_ACCESS_SECRET: ci_test_secret_must_be_at_least_32_chars_long

  # ── NestJS AI Service ─────────────────────────────────────────────────────
  ai-service:
    name: AI Service (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - name: Install dependencies
        run: cd ../../../ && pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm exec jest --ci

  # ── Next.js Web Client ────────────────────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - name: Install dependencies
        run: cd ../../ && pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_AUTH_URL: http://localhost:3001
          NEXT_PUBLIC_CHAT_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws

  # ── Flutter Client ─────────────────────────────────────────────────────────
  flutter-client:
    name: Flutter Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test --coverage
