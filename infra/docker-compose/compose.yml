services:
  mongo:
    image: mongo:7
    container_name: chat-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
      - ../mongodb_config/logs:/var/log/mongodb
      - ../mongodb_config/mongod.conf:/etc/mongod.conf:ro
    command: ["--replSet", "rsMyWebApp", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net
   
  mongo-setup: 
    image: mongo:7
    container_name: chat-mongo-setup 
    networks:
      - app-net
    depends_on:
      mongo: 
        condition: service_healthy
    entrypoint: >
      sh -c "mongosh --host mongo:27017 --eval 'rs.initiate({_id:\"rsMyWebApp\",members:[{_id:0,host:\"mongo:27017\"}]})' || true"
    
  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chat-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: platform
      RABBITMQ_DEFAULT_PASS: platform
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - app-net

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: chat-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-net

  auth-service:
    build:
      context: ../..
      dockerfile: apps/server/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../apps/server/auth-service/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/platform
      MONGODB_URI: mongodb://mongo:27017/platform
      REDIS_HOST: redis
    networks:
      - app-net

  chat-service:
    build:
      context: ../../apps/server/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: platform
      SPRING_RABBITMQ_PASSWORD: platform
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/platform
      SPRING_DATA_REDIS_HOST: redis
      # Firebase Admin SDK (base64 của service-account JSON). Rỗng = FCM tắt (no-op an toàn).
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
      # Bean overriding needed: @EnableWebSocketMessageBroker registers SimpleUrlHandlerMapping
      # with same name as Spring MVC's — benign override, required by Spring WebSocket internals.
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      # Cấu hình Mail cho Spring Boot (Chat Service)
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USER}
      SPRING_MAIL_PASSWORD: ${MAIL_PASS}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      # OpenTelemetry — export traces to Jaeger via OTLP HTTP
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    networks:
      - app-net

  ai-service:
    build:
      context: ../..
      dockerfile: apps/server/ai-service/Dockerfile
    container_name: ai-service
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      MONGODB_URI: mongodb://mongo:27017/platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-sonnet-4-5
      ANTHROPIC_FALLBACK_MODEL: claude-haiku-4-5-20251001
      AI_BOT_USER_ID: ai-bot-000000000000000000000001
      AI_BOT_DISPLAY_NAME: ${AI_BOT_DISPLAY_NAME:-PON AI}
      REDIS_AI_REQUEST_CHANNEL: ai:request
      REDIS_AI_RESPONSE_PREFIX: ai:response
      QDRANT_URL: http://qdrant:6333
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      KB_EMBEDDING_MODEL: ${KB_EMBEDDING_MODEL:-voyage-3.5}
      AI_ENABLE_THINKING: ${AI_ENABLE_THINKING:-false}
      AI_THINKING_BUDGET: ${AI_THINKING_BUDGET:-8000}
      AI_MONTHLY_TOKEN_LIMIT: ${AI_MONTHLY_TOKEN_LIMIT:-500000}
      RABBITMQ_URL: amqp://platform:platform@rabbitmq:5672
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: ai-service
      CONNECTOR_INTERNAL_URL: http://connector-service:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - app-net
    restart: unless-stopped

  connector-service:
    build:
      context: ../..
      dockerfile: apps/server/connector-service/Dockerfile
    container_name: connector-service
    ports:
      - "3003:3003"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      MONGO_URI: mongodb://mongo:27017/platform
      CONNECTOR_VAULT_KEY: ${CONNECTOR_VAULT_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-http://localhost:3003}
      CLIENT_REDIRECT_URL: ${CLIENT_REDIRECT_URL:-http://localhost:3000/integrations}
      NOTION_CLIENT_ID: ${NOTION_CLIENT_ID:-}
      NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET:-}
      NOTION_MCP_URL: ${NOTION_MCP_URL:-https://mcp.notion.com/sse}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    networks:
      - app-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: chat-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mongo_data:
  qdrant_data:
  rabbitmq_data:
